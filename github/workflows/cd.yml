name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
 deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy на сервер
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd /opt/fitness_app
            git pull
            docker compose down
            docker compose up -d --build
